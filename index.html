<script>
/* 论文正文分页：只改变显示，不把分页标记写入正文。 */
const paperPageState=Object.create(null);
function paperSectionPageKey(){return selectedPaperSection()?.id||'paper'}
function normalizePaperPageBlocks(ed){
  [...ed.childNodes].forEach(node=>{
    if(node.nodeType===Node.TEXT_NODE){
      if(!node.textContent.trim()){node.remove();return}
      const p=document.createElement('p');p.textContent=node.textContent;node.replaceWith(p)
    }
  })
}
function clearPaperPageMarks(ed){
  if(!ed)return;
  [...ed.children].forEach(el=>{el.classList.remove('paper-page-hidden');el.removeAttribute('data-paper-page')})
}
function selectionTopBlock(ed){
  const sel=window.getSelection();if(!sel?.rangeCount)return null;
  let node=sel.anchorNode;if(!node||!ed.contains(node))return null;
  if(node.nodeType===Node.TEXT_NODE)node=node.parentElement;
  while(node&&node.parentElement!==ed)node=node.parentElement;
  return node
}
function paginatePaper(followSelection=false){
  const ed=$('#paperEditor'),indicator=$('#paperPageIndicator');if(!ed||!indicator)return;
  const activeBlock=followSelection?selectionTopBlock(ed):null;
  normalizePaperPageBlocks(ed);clearPaperPageMarks(ed);
  const blocks=[...ed.children],limit=Math.max(420,ed.clientHeight-18);
  let page=1,used=0;
  blocks.forEach(block=>{
    const cs=getComputedStyle(block),height=Math.max(24,block.getBoundingClientRect().height)+(parseFloat(cs.marginTop)||0)+(parseFloat(cs.marginBottom)||0);
    if(used>0&&used+height>limit){page++;used=0}
    block.dataset.paperPage=String(page);used+=Math.min(height,limit)
    if(height>=limit){page++;used=0}
  });
  const total=Math.max(1,blocks.length?page-(used===0?1:0):1),key=paperSectionPageKey();
  let current=paperPageState[key]||1;
  if(activeBlock?.dataset.paperPage)current=Number(activeBlock.dataset.paperPage);
  current=Math.max(1,Math.min(total,current));paperPageState[key]=current;
  blocks.forEach(block=>block.classList.toggle('paper-page-hidden',Number(block.dataset.paperPage)!==current));
  indicator.textContent=`第 ${current} / ${total} 页`;
  const prev=$('#paperPagePrev'),next=$('#paperPageNext');
  if(prev)prev.disabled=current<=1;if(next)next.disabled=current>=total
}
function turnPaperPage(step){
  const key=paperSectionPageKey();paperPageState[key]=Math.max(1,(paperPageState[key]||1)+step);paginatePaper(false);
  $('#paperEditor')?.scrollTo({top:0,behavior:'smooth'})
}
const savePaperBodyBeforePaging=savePaperBody;
savePaperBody=function(quiet=false){
  const ed=$('#paperEditor');if(!ed)return savePaperBodyBeforePaging(quiet);
  const key=paperSectionPageKey(),page=paperPageState[key]||1;
  clearPaperPageMarks(ed);savePaperBodyBeforePaging(quiet);
  paperPageState[key]=page;paginatePaper(false)
}
const focusCommentBeforePaging=focusComment;
focusComment=function(id){
  const p=current(),comment=p.comments.find(c=>c.id===id);
  if(comment&&comment.sectionId===p.selectedSectionId){
    const ed=$('#paperEditor');clearPaperPageMarks(ed);
    const mark=document.querySelector(`[data-comment-id="${comment.markerId}"]`);
    let block=mark;while(block&&block.parentElement!==ed)block=block.parentElement;
    paginatePaper(false);
    if(block?.dataset.paperPage){paperPageState[paperSectionPageKey()]=Number(block.dataset.paperPage);paginatePaper(false)}
  }
  focusCommentBeforePaging(id)
}
const renderPaperBeforePaging=renderPaper;
renderPaper=function(){
  renderPaperBeforePaging();
  const center=document.querySelector('.paper-center'),sheet=center?.querySelector('.paper-sheet'),ed=$('#paperEditor');
  if(!center||!sheet||!ed)return;
  sheet.insertAdjacentHTML('afterend',`<nav class="paper-page-nav" aria-label="论文正文分页"><button id="paperPagePrev" class="btn sm" onclick="turnPaperPage(-1)">← 上一页</button><span id="paperPageIndicator" class="paper-page-indicator">第 1 / 1 页</span><button id="paperPageNext" class="btn sm" onclick="turnPaperPage(1)">下一页 →</button></nav>`);
  ed.addEventListener('input',()=>requestAnimationFrame(()=>paginatePaper(true)));
  ed.addEventListener('load',()=>requestAnimationFrame(()=>paginatePaper(false)),true);
  requestAnimationFrame(()=>paginatePaper(false));setTimeout(()=>paginatePaper(false),350)
}
save(true);render();
</script>
